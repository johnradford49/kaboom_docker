version: '3.8'

services:
  kaboom:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_PEER_HOST=192.168.5.22   # <your-machine-ip>
      - VITE_PEER_PORT=9000
      - VITE_PEERJS_ID=kaboom-local-host
    depends_on:
      - peerserver
      

  peerserver:
    image: node:18-alpine
    command: npx peerjs --port 9000 --path /peerjs --key peerjs
    ports:
      - "9090:9000"
