services:
  kaboom:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - peerserver

  peerserver:
    image: node:18-alpine
    command: sh -c "npm install -g peer && peerjs --port 9000 --path /peerjs --key peerjs"
    ports:
      - "9090:9000"
