services:
  kaboom:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_PEER_HOST=localhost
      - VITE_PEER_PORT=9000
      - VITE_PEERJS_ID=kaboom123
    depends_on:
      - peerserver

  peerserver:
    image: peerjs/peerjs-server
    ports:
      - "3090:9000"
    command: --port 9000 --path /peerjs --key peerjs
